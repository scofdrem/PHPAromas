services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 1000aroms-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - 1000aroms-network

  db:
    image: mysql:8.0
    container_name: 1000aroms-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: 1000aroms
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - 1000aroms-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: 1000aroms-mail
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - 1000aroms-network

networks:
  1000aroms-network:
    driver: bridge

volumes:
  mysql-data:
